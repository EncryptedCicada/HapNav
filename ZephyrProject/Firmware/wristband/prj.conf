# ── Core ──────────────────────────────────────────────────────────────────────
CONFIG_GPIO=y
CONFIG_I2C=y

# ── I2C mux + DA7280 driver ───────────────────────────────────────────────────
# The TI TCA954X driver also covers the NXP PCA9546A on our wristband; it
# publishes each mux channel as a virtual i2c bus so we don't have to do
# manual channel-select between transactions.
CONFIG_I2C_TCA954X=y
# Channel-bus init must happen *after* the root mux is brought up.
CONFIG_I2C_TCA954X_CHANNEL_INIT_PRIO=70

# Out-of-tree haptic driver (modules/da7280-haptic, registered in CMakeLists).
CONFIG_HAPTIC_DA7280=y
# Defang chips at boot before applying config — prevents stuck-on actuators
# if the host MCU resets while the DA7280 keeps power.
CONFIG_HAPTIC_DA7280_SAFE_INIT=y
# Hard backstop on summed amplitude across all four chips. Sized just above
# 4 × per-channel-drive-cap (4 × 60 = 240) so the per-channel ceiling is the
# real limit; this only catches a runaway that breaks the per-channel rule.
# Policy still scales proportionally at 150 well below this number.
CONFIG_HAPTIC_DA7280_TOTAL_DRIVE_CAP=250
CONFIG_HAPTIC_DA7280_USE_SYSTEM_WORKQUEUE=y

# ── HapNav haptic policy ──────────────────────────────────────────────────────
CONFIG_HAPNAV_HAPTICS=y
# Toggle this on for bench validation (disables BLE-driven reactions and runs
# the comprehensive selftest sequence). Off for normal navigation.
CONFIG_HAPNAV_SELFTEST=n

# ── BLE (peripheral role: hosts GATT server) ──────────────────────────────────
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="HapNav-Wrist"
CONFIG_BT_MAX_CONN=1

# Match the pin's MTU so a 219-byte combined frame lands in one PDU.
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_L2CAP_TX_MTU=247

# Floats in printk for quaternion JSON.
CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_FPU=y

# Worker thread runs the 20 Hz drive loop; bump its stack a touch since
# logging from inside it can spike usage.
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# ── Logging ───────────────────────────────────────────────────────────────────
# Minimal mode strips timestamps and module prefixes from LOG_*(), so the few
# status lines (connect/disconnect/init) print as plain text and the JSON
# stream we emit via printk() stays unframed.
CONFIG_LOG=y
CONFIG_LOG_MODE_MINIMAL=y
