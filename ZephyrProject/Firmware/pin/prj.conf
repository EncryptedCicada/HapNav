# ── Core ──────────────────────────────────────────────────────────────────────
CONFIG_GPIO=y
CONFIG_I2C=y

# Madgwick uses sqrtf(); needs libm.
CONFIG_FPU=y
CONFIG_NEWLIB_LIBC=y

# ── ToF: VL53L1X head-clearance (in-tree Zephyr driver) ───────────────────────
# The VL53L5CX is brought up via the vendor ULD by our own wrapper. The
# head-pointing VL53L1X uses Zephyr's sensor driver — DT node is deferred so
# we can move the VL53L5CX off 0x29 before XSHUT is released.
CONFIG_SENSOR=y
CONFIG_VL53L1X=y
CONFIG_VL53L1X_XSHUT=y
# Polling is fine at 10 Hz; saves one GPIO + the IRQ thread.
CONFIG_VL53L1X_INTERRUPT_MODE=n

# ── BLE (central role: drives the wristband) ─────────────────────────────────
CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_DEVICE_NAME="HapNav-Pin"
CONFIG_BT_MAX_CONN=1

# Bigger ATT MTU so a 212-byte combined frame fits in a single ATT_WRITE_CMD.
# ACL buffers cover MTU + 4 bytes of L2CAP header.
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_L2CAP_TX_MTU=247

# ESP32 BLE controller benefits from a generous heap; ToF firmware blob upload
# also wants the bigger main stack.
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_MAIN_STACK_SIZE=8192

# ── Logging ───────────────────────────────────────────────────────────────────
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Float printing in LOG_*() format strings.
CONFIG_CBPRINTF_FP_SUPPORT=y
