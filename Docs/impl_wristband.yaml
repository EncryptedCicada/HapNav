project: HapNav
component: Wristband
status: Firmware v3 (Haptic policy integrated)

architecture:
  mcu: Seeed XIAO nRF52840
  role: BLE Peripheral & Haptic Actuator
  i2c_topology:
    bus: i2c1 (P0.05 SCL = D5, P0.04 SDA = D4, 400 kHz, nordic,nrf-twi)
    mux:
      part: PCA9546A
      addr: 0x70
      channels: 4
    actuators:
      - { channel: 0, role: LEFT,         driver: DA7280 @ 0x4A, lra: G1040003D }
      - { channel: 1, role: CENTER_LEFT,  driver: DA7280 @ 0x4A, lra: G1040003D }
      - { channel: 2, role: CENTER_RIGHT, driver: DA7280 @ 0x4A, lra: G1040003D }
      - { channel: 3, role: RIGHT,        driver: DA7280 @ 0x4A, lra: G1040003D }
    notes:
      - "All four DA7280s share I2C address 0x4A; mux isolates them per channel."
      - "Mux selection is exclusive — one channel at a time, latched between drive writes."

actuator_config:
  motor: G1040003D (Jinlong LRA)
  driver: DA7280 (Renesas)
  mode: open_loop_LRA / DRO (I2C direct)
  resonant_freq_hz: 170.0
  v_nominal_vrms: 2.106       # match SparkFun defaultMotor() — leaves accel headroom
  v_absmax_vrms: 2.26         # ditto
  imax_ma: 165.4              # ditto
  impedance_ohm: 13.8
  acceleration_en: true       # → 7-bit signed amplitude (max 127) at TOP_CTL2
  rapid_stop_en: true
  freq_track_en: false        # explicit per spec (auto_resonance_allowed: false)
  bemf_sense_en: false
  per_channel_drive_cap: 80   # of 127 (~63 %) — keeps single-LRA current safe
  total_drive_cap: 200        # sum across 4 channels — protects supply from brownout
  rationale: "Driving four LRAs simultaneously near rated voltage browned out the nRF
              during testing (full chip reboot mid-drive, motor latched on by chip's
              register state). SparkFun's library uses 2.106 / 2.26 Vrms by default;
              we adopt the same and add a global current-budget cap on top."

driver_port:
  source_of_truth: ZephyrProject/Drivers/da7280/da7280.c (linux kernel reference, NOT compiled)
  reason_not_used: "Upstream uses regmap, work_struct, threaded_irq, ff input subsystem — none exist on Zephyr."
  zephyr_replacement: ZephyrProject/Firmware/lib/haptics/src/da7280.c
  coverage:
    - chip detection via CHIP_REV (0xBA)
    - LRA period programming for arbitrary resonance
    - voltage / IMAX / V2I impedance calibration
    - TOP_CFG1 mode bits
    - DRO drive at TOP_CTL2 (single-byte hot path)
    - INACTIVE / DRO mode toggle
    - IRQ event read+clear (no IRQ pin wired)
  intentionally_omitted:
    - PWM / RTWM / ETWM modes
    - waveform-memory (snippet/sequence) playback
    - back-EMF and frequency-tracking telemetry
    - force-feedback effect upload

drive_pipeline:
  inputs:
    - hapnav_obstacles.urgency[4]    # uint8 per channel from pin
    - hapnav_obstacles.flags         # STATIONARY | BLOCKED | INVALID | YAW_SLEW | DROPOFF
    - hapnav_obstacles.nearest_range_mm
  worker_rate_hz: 20                  # decoupled from BLE arrival jitter
  watchdog_ms: 250                    # → mute ramp if frames stop arriving
  stages:
    1_latch:        "BLE write_no_response stores latest obstacles under mutex"
    2_flag_gate:    "STATIONARY/BLOCKED/INVALID → all-zero target"
    3_dropoff:      "DROPOFF → 150 ms on / 150 ms off square-wave on all 4 channels"
    4_yaw_dampen:   "YAW_SLEW → multiply target by 0.4 (avoid spurious slewing buzz)"
    5_curve:        "urgency<32 → 0; else linear map to [8..110]"
    6_fatigue:      "5 s leaky bucket per channel; >70 % duty → linear taper to 40 %"
    7_rate_limit:   "±24 / tick → full-scale ramp ~250 ms"
    8_drive:        "mux-select(channel) + i2c write to TOP_CTL2 only when amp changes"

ble_protocol:
  unchanged: true
  consumed: ["timestamp_ms", "obstacles.urgency[4]", "obstacles.flags"]
  ignored:  ["distances_mm[64]", "target_status[64]", "quat[4]"]
  notes:
    - "JSON debug print of full frame retained on UART for bring-up."
    - "Pin's 10 Hz sample rate is unchanged; wristband worker runs at 20 Hz so smoothing/dropoff/fatigue evolve on a stable clock."

source_layout:
  - Firmware/lib/haptics/include/hapnav/pca9546a.h
  - Firmware/lib/haptics/include/hapnav/da7280.h
  - Firmware/lib/haptics/include/hapnav/haptics.h
  - Firmware/lib/haptics/src/pca9546a.c
  - Firmware/lib/haptics/src/da7280.c
  - Firmware/lib/haptics/src/haptics.c
  - Firmware/wristband/src/main.c          # calls hapnav_haptics_init() before BLE
  - Firmware/wristband/src/ble.c           # frame_write() → hapnav_haptics_consume_frame()
  - Firmware/wristband/boards/xiao_ble.overlay  # i2c0 enabled @ 400 kHz
  - Firmware/wristband/prj.conf            # CONFIG_I2C, larger workqueue stack

build:
  cmd: "cd ZephyrProject/Firmware/wristband && west build -b xiao_ble"
  flash: "west flash"

testing:
  bench:
    - hapnav_haptics_inject() lets you script urgency patterns without a pin
    - print_frame_json() on UART confirms BLE arrival and obstacles content
  validation_checklist:
    - "All four channels respond at boot (DA7280 WHO_AM_I = 0xBA each)"
    - "Pull power to pin → wristband mutes within ~250 ms"
    - "Spoof DROPOFF flag → all 4 LRAs pulse in unison at ~3 Hz"
    - "Drive a single channel hard for >5 s → fatigue taper engages, drive drops to ~40 %"
