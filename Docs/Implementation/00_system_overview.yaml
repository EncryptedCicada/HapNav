project: HapNav
status: Firmware v4 (out-of-tree DA7280 module + i2c-mux + selftest harness)

docs:
  overview:           Docs/Implementation/00_overview.md
  system_yaml:        Docs/Implementation/00_system_overview.yaml
  chest_pin:          Docs/Implementation/01_chest_pin.md
  wristband:          Docs/Implementation/02_wristband.md
  wristband_yaml:     Docs/Implementation/02_wristband.yaml
  ble_protocol:       Docs/Implementation/03_ble_protocol.md
  sensor_fusion:      Docs/Implementation/04_sensor_fusion.md
  obstacle:           Docs/Implementation/05_obstacle_detection.md
  dropoff:            Docs/Implementation/06_dropoff_detection.md
  haptic_policy:      Docs/Implementation/07_haptic_policy.md
  power_and_assembly: Docs/Implementation/08_power_and_assembly.md

architecture:
  chest_pin:
    mcu: Seeed XIAO ESP32-S3
    role: BLE Central & Compute Hub
    sensors:
      imu: LSM6DSO (I2C 0x6B)
      magnetometer: LIS2MDL (I2C 0x1E)
      tof_grid:
        part: VL53L5CX (8x8 grid, 10 Hz)
        i2c_addr: 0x29 default → moved to 0x2A at boot (vendor ULD)
        physical_mount: chest enclosure face, −8° downtilt
        optical_roll: +45° about the optical axis (the original main
                      diagonal becomes the world-frame horizontal line)
        purpose: lateral obstacle detection (4 urgency bins, ±27.5°
                 horizontal extent after the roll), plus drop-off via the
                 lower-half-of-diamond pixels.
      tof_head:
        part: VL53L1X (single-zone)
        i2c_addr: 0x29 (Zephyr in-tree st,vl53l1x driver, zephyr,deferred-init)
        xshut_gpio: xiao_d.D2 (&gpio0 3)
        physical_mount: tilted +20° above world horizontal
                        (= +28° relative to the VL53L5CX face)
        purpose: head-clearance detection. Sets
                 HAPNAV_OBS_FLAG_HEAD_OBSTACLE when slant range ≤ 2.2 m.
      tof_height_calibration:
        part: VL53L1X (down-facing)
        status: planned — requires either a 2nd XSHUT line on the pin or
                 a TCA9548A mux. See Docs/Implementation/09_head_clearance.md.
        purpose: one-shot live measurement of pin-mount height to replace
                 the hard-coded SENSOR_HEIGHT_M=1.35 across the pipeline.
  wristband:
    mcu: Seeed XIAO nRF52840
    role: BLE Peripheral & Haptic Actuator
    i2c_mux: PCA9546A @ 0x70 (driven by Zephyr's in-tree ti,tca9546a — binding
             header explicitly notes "compatible with NXP PCA9546A")
    actuators: 4x DA7280 @ 0x4A (one per mux channel) + Jinlong G1040003D LRA
    drive_policy: "20 Hz worker; watchdog mute, dropoff square-wave, fatigue
                   taper (true leaky bucket — fills only while driving),
                   rate limit, two stacked drive caps (policy 150,
                   driver 250)"

geometry_and_physics:
  user_height_cm: 175
  mount_point: Chest level (approx. armpit height)
  sensor_height_m: 1.35
  sensor_downtilt_deg: 8.0       # estimated for head-clearance vs floor visibility
  field_of_view:
    tof_grid:
      diagonal_deg: 63
      per_axis_deg: 44.5
      grid_resolution: 8x8 (64 zones)
      effective_horizontal_after_45deg_roll_deg: 55   # ±27.5° corner-to-corner
      bin_width_deg: 13.75
    tof_head:
      cone_full_angle_deg: 27
      world_tilt_deg: +20
      slant_threshold_mm: 2200
  operating_range_m: [0.3, 3.0]
  assumed_walking_speed_mps: 0.7
  coordinate_system:
    sensor_frame: "+X right, +Y up, +Z forward (optical axis)"
    body_frame:   "+X right, +Y back, +Z up (-Y is user forward)"
    world_frame:  "Gravity-aligned, Z = up"

ble_communication:
  protocol: Custom GATT Service
  mtu: 247 bytes (negotiated)
  sample_rate: 10 Hz
  data_frame_v2:
    size_bytes: 219
    structure:
      - timestamp_ms: uint32
      - quat_wxyz: float32[4]    # Madgwick fused
      - distances_mm: int16[64]
      - target_status: uint8[64]
      - obstacles:
          urgency: uint8[4]      # Left, Center-Left, Center-Right, Right
          nearest_range_mm: int16
          flags: uint8           # Stationary, Blocked, Invalid, Slew,
                                 # Dropoff, HeadObstacle (bit 5)

algorithmic_pipeline:
  sensor_fusion:
    algorithm: Madgwick AHRS (MARG variant)
    beta: 0.1
    corrections: "Magnetometer X-axis flipped (mag_raw[0] = -mag_raw[0])"
  obstacle_detection:
    stages:
      1_validity:      "Filter by status (5,6,9) and range (300-3000 mm)"
      2_projection:    "Rotate pre-computed rays B->W using current quaternion"
      3_classification:
        floor:     "World Z < -1.20 m below sensor"
        ceiling:   "World Z > +0.40 m above sensor (head + 5 cm)"
        candidate: "Anything between floor and ceiling"
      4_clustering:    "8-connectivity, delta-d threshold 200 mm, min-size 2 px"
      5_closing_rate:  "Frame-to-frame delta-range tracking (suspended during yaw slew)"
      6_urgency:       "Max(Proximity_Score, TTC_Score) scaled by motion flags"
  dropoff_detection:
    logic: "Geometric reasoning over negative space"
    trigger: "Missing floor returns in expected bottom-row rays"
    threshold: ">= 3 pixels missing or range ratio > 1.3x predicted"

firmware_stack:
  rtos: Zephyr 4.4.99
  build_system: West / CMake
  toolchain:
    pin:       xtensa-espressif_esp32s3_zephyr-elf
    wristband: arm-zephyr-eabi
  shared_libs:
    - lib/ble:     "Shared UUIDs and frame structs"
    - lib/sensors: "Zephyr glue for STMicro ULDs + Madgwick + obstacle pipeline"
    - lib/haptics: "High-level drive policy + isolated selftest harness;
                    talks to the DA7280 driver via Zephyr device handles"
  out_of_tree_modules:
    - modules/da7280-haptic:
        binding: dlg,da7280
        kconfig: HAPTIC_DA7280
        coverage: "DRO mode (TOP_CTL2 hot path), full TOP_CFG1..5 setup,
                   V2I calibration, RTWM/ETWM (driver supports, app unused),
                   waveform memory upload, IRQ workqueue, SAFE_INIT prologue,
                   global drive budget across all instances."
        upstream_reference: "ZephyrProject/Drivers/da7280/da7280.c (Linux
                             kernel; kept for documentation only — depends
                             on regmap, work_struct, threaded IRQs, and the
                             FF input subsystem, none of which exist on
                             Zephyr, so it is NOT compiled)."

build_and_flash:
  pin:
    cmd:   "cd ZephyrProject/Firmware/pin && west build -b xiao_esp32s3"
    flash: "west flash"
  wristband:
    cmd:   "cd ZephyrProject/Firmware/wristband && west build -b xiao_ble"
    flash: "west flash"
    selftest_gate: "CONFIG_HAPNAV_SELFTEST in prj.conf — y for bench, n for nav"
